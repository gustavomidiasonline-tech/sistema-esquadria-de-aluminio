version: "3.9"

# =============================================================================
# ERP Sistema Aluminio & Vidracarias — Docker Compose PRODUCTION Override
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from dev:
#   - NODE_ENV=production
#   - No host port bindings except for orquestrador (4000) and postgres (5432)
#   - Resource limits applied to each service
#   - Restart policy: always
#   - Logging driver with rotation
#   - Named volumes with explicit driver options
# =============================================================================

networks:
  erp-network:
    driver: bridge
    name: erp-network-prod

volumes:
  postgres-data:
    name: erp-postgres-data-prod
    driver: local
  postgres-config:
    name: erp-postgres-config-prod
    driver: local

x-squad-prod-defaults: &squad-prod-defaults
  restart: always
  environment:
    NODE_ENV: production
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Production settings
  # ---------------------------------------------------------------------------
  postgres:
    <<: *squad-prod-defaults
    environment:
      NODE_ENV: production
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required in production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}
      POSTGRES_DB: ${POSTGRES_DB:-erp_aluminio}
      PGDATA: /var/lib/postgresql/data/pgdata
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    # Expose postgres only to the Docker network in production (no host binding)
    ports: !reset []

  # ---------------------------------------------------------------------------
  # Squad Producao
  # ---------------------------------------------------------------------------
  squad-producao:
    <<: *squad-prod-defaults
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_aluminio}
    # No host binding in production — only accessible within erp-network
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Squad Estoque
  # ---------------------------------------------------------------------------
  squad-estoque:
    <<: *squad-prod-defaults
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_aluminio}
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Squad CRM
  # ---------------------------------------------------------------------------
  squad-crm:
    <<: *squad-prod-defaults
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_aluminio}
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Squad Financeiro
  # ---------------------------------------------------------------------------
  squad-financeiro:
    <<: *squad-prod-defaults
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_aluminio}
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Squad Dashboard
  # ---------------------------------------------------------------------------
  squad-dashboard:
    <<: *squad-prod-defaults
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_aluminio}
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Squad Qualidade
  # ---------------------------------------------------------------------------
  squad-qualidade:
    <<: *squad-prod-defaults
    environment:
      NODE_ENV: production
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_aluminio}
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Squad Integradores
  # ---------------------------------------------------------------------------
  squad-integradores:
    <<: *squad-prod-defaults
    environment:
      NODE_ENV: production
      PORT: 3008
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_aluminio}
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Orquestrador — Public-facing entry point in production
  # ---------------------------------------------------------------------------
  orquestrador:
    <<: *squad-prod-defaults
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_aluminio}
      SQUAD_PRODUCAO_URL: http://squad-producao:3002
      SQUAD_ESTOQUE_URL: http://squad-estoque:3003
      SQUAD_CRM_URL: http://squad-crm:3004
      SQUAD_FINANCEIRO_URL: http://squad-financeiro:3005
      SQUAD_DASHBOARD_URL: http://squad-dashboard:3006
      SQUAD_QUALIDADE_URL: http://squad-qualidade:3007
      SQUAD_INTEGRADORES_URL: http://squad-integradores:3008
    # Only the orquestrador is exposed to the host in production
    ports:
      - "${PORT_ORQUESTRADOR:-4000}:4000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 128M
